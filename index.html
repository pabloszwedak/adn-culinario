<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADN Culinario | Sistema de Élite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfaf8; }
        .recipe-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-3xl mx-auto" id="main-view">
    <header class="text-center mb-12">
        <h1 class="text-5xl font-extrabold text-stone-900 tracking-tighter">ADN Culinario</h1>
        <p class="text-amber-700 font-medium mt-2">Protegiendo el Legado con Precisión Técnica</p>
    </header>

    <div class="bg-white p-2 rounded-2xl shadow-sm border border-stone-200 mb-8 flex items-center px-4">
        <span class="text-stone-400">🔍</span>
        <input type="text" id="bus-nombre" placeholder="Buscar en el archivo..." 
               class="w-full p-3 outline-none bg-transparent" oninput="App.filtrar()">
    </div>

    <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-stone-100 mb-10">
        <div class="flex items-center gap-3 mb-6">
            <div class="h-8 w-1.5 bg-amber-600 rounded-full"></div>
            <h2 class="text-xl font-bold text-stone-800">Nueva Entrada de ADN</h2>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div>
                <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Nombre del Legado</label>
                <input type="text" id="rec-nom" class="w-full border-b-2 border-stone-100 py-2 outline-none focus:border-amber-500 transition-colors" placeholder="Ej: Arroz de la Abuela">
            </div>
            <div>
                <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Categoría (HU2)</label>
                <select id="rec-cat" class="w-full border-b-2 border-stone-100 py-2 outline-none focus:border-amber-500 bg-transparent">
                    <option value="Panadería">🥖 Panadería</option>
                    <option value="Salsas">🍯 Salsas</option>
                    <option value="Principal">🥘 Plato Principal</option>
                    <option value="Repostería">🍰 Repostería</option>
                </select>
            </div>
        </div>

        <div class="mb-8">
            <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Ingredientes</label>
            <div class="flex gap-2 mt-2">
                <input type="text" id="ing-nom" placeholder="Ingrediente" class="flex-grow bg-stone-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-amber-200">
                <input type="number" id="ing-cant" placeholder="Cant." class="w-20 bg-stone-50 p-3 rounded-xl outline-none">
                <select id="ing-uni" class="w-24 bg-stone-100 p-3 rounded-xl outline-none font-bold text-stone-600">
                    <option value="gr">gr</option>
                    <option value="ml">ml</option>
                    <option value="kg">kg</option>
                    <option value="l">l</option>
                    <option value="pizca">pizca</option>
                </select>
                <button onclick="App.addIng()" class="bg-stone-900 text-white px-5 rounded-xl hover:bg-amber-600 transition-colors font-bold text-xl">+</button>
            </div>
            <div id="lista-ing" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-2"></div>
        </div>

        <button onclick="App.guardar()" class="w-full bg-amber-600 text-white font-bold py-5 rounded-2xl hover:bg-amber-700 shadow-lg shadow-amber-200 transition-all active:scale-[0.98]">
            SINCRONIZAR CON EL LEGADO
        </button>
        <p id="msg" class="text-center text-xs mt-4 text-stone-400 font-medium"></p>
    </div>

    <h2 class="text-2xl font-bold text-stone-800 mb-6 px-2">Archivo Guardado</h2>
    <div id="grid-recetas" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
</div>
