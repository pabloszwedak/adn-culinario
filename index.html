<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADN Culinario - Base de Datos Activa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff5ed; padding: 20px; color: #431407; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { color: #f97316; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #fed7aa; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #f97316; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ea580c; }
        #mensaje { margin-top: 15px; text-align: center; font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍳 ADN Culinario</h1>
    <p style="text-align: center; font-size: 0.9em; color: #a3442d; background: #fed7aa; border-radius: 5px;">MVP2 - MULTI-ENTIDAD ACTIVO</p>
    
    <input type="text" id="nombreReceta" placeholder="Nombre de la Receta">

    <div id="seccion-ingredientes" style="margin-bottom: 20px;">
        <p style="font-weight: bold; font-size: 0.8em;">📦 INGREDIENTES</p>
        <div id="lista-ingredientes-temp"></div>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="ing-cant" placeholder="Cant." style="width: 70px;">
            <input type="text" id="ing-nombre" placeholder="Ingrediente" style="flex: 1;">
            <button onclick="ui.agregarIngrediente()" style="width: 40px; background: #431407;">+</button>
        </div>
    </div>

    <div id="seccion-pasos" style="margin-bottom: 20px;">
        <p style="font-weight: bold; font-size: 0.8em;">🔥 PASOS TÉCNICOS</p>
        <div id="lista-pasos-temp"></div>
        <div style="display: flex; gap: 5px; margin-bottom: 5px;">
            <input type="text" id="paso-inst" placeholder="Instrucción (ej. Batir)">
        </div>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="paso-temp" placeholder="ºC" style="flex: 1;">
            <input type="number" id="paso-tiempo" placeholder="min" style="flex: 1;">
            <button onclick="ui.agregarPaso()" style="width: 40px; background: #431407;">+</button>
        </div>
    </div>
    
    <button onclick="guardarReceta()" id="btn-guardar">Guardar Receta Completa</button>
    <div id="mensaje"></div>
    <div id="grid-recetas"></div>
</div>

<script>
	// 1. CONFIGURACIÓN GLOBAL
const SB_URL = 'https://tsmbobfnvforggaajurw.supabase.co'; 
const SB_KEY = 'sb_publishable_z7-wVRQ1qGgPOHs6GIhDeg_A5L3wQD_';
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

let tempIngredientes = [];
let tempPasos = [];

// 2. OBJETO API (Lógica de base de datos)
const api = {
    async guardarRecetaCompleta(nombre, ingredientes, pasos) {
        const { data: receta, error: rError } = await supabaseClient
            .from('recetas')
            .insert([{ nombre }])
            .select().single();
        if (rError) throw rError;

        const ingData = ingredientes.map(i => ({ ...i, receta_id: receta.id }));
        await supabaseClient.from('ingredientes').insert(ingData);

        const pasosData = pasos.map((p, idx) => ({ ...p, receta_id: receta.id, orden: idx }));
        await supabaseClient.from('pasos').insert(pasosData);
        return receta;
    },
    async obtenerTodoElLegado() {
        const { data, error } = await supabaseClient
            .from('recetas')
            .select(`id, nombre, created_at, ingredientes(*), pasos(*)`)
            .order('created_at', { ascending: false });
        if (error) throw error; 
        return data;
    }
};

// 3. OBJETO UI (Lógica de interfaz - ¡IMPORTANTE!)
const ui = {
    agregarIngrediente() {
        const nombre = document.getElementById('ing-nombre').value;
        const cantidad = document.getElementById('ing-cant').value;
        if(!nombre || !cantidad) return;
        tempIngredientes.push({ nombre, cantidad, unidad: 'g' });
        this.render();
        document.getElementById('ing-nombre').value = ""; 
        document.getElementById('ing-cant').value = "";
    },
    agregarPaso() {
        const inst = document.getElementById('paso-inst').value;
        const temp = parseFloat(document.getElementById('paso-temp').value);
        const tiempo = document.getElementById('paso-tiempo').value;
        
        if (temp > 300 || temp < -50) { 
            alert("⚠️ Temperatura fuera de rango (-50 a 300ºC)"); 
            return; 
        }
        if(!inst || isNaN(temp)) return;
        
        tempPasos.push({ instruccion: inst, temperatura: temp, tiempo });
        this.render();
        document.getElementById('paso-inst').value = ""; 
        document.getElementById('paso-temp').value = ""; 
        document.getElementById('paso-tiempo').value = "";
    },
    render() {
        const listIng = document.getElementById('lista-ing-temp');
        const listPas = document.getElementById('lista-pasos-temp');
        if(listIng) listIng.innerHTML = tempIngredientes.map(i => `<div class="list-item">🔹 ${i.cantidad}g ${i.nombre}</div>`).join('');
        if(listPas) listPas.innerHTML = tempPasos.map(p => `<div class="list-item">⏱️ ${p.instruccion} (${p.temperatura}ºC)</div>`).join('');
    }
};

// 4. FUNCIONES DE CONTROLADOR (Visibles para el HTML)
async function guardarReceta() {
    const msg = document.getElementById('mensaje');
    const nombre = document.getElementById('nombreReceta').value;
    
    if(!nombre || tempIngredientes.length === 0) { 
        msg.innerHTML = "<span style='color:red;'>❌ Faltan datos o ingredientes</span>"; 
        return; 
    }
    
    try {
        msg.innerHTML = "⏳ Sincronizando ADN...";
        await api.guardarRecetaCompleta(nombre, tempIngredientes, tempPasos);
        msg.innerHTML = "<span style='color:green;'>✅ Legado Guardado con Éxito</span>";
        
        // Reset
        tempIngredientes = []; 
        tempPasos = []; 
        ui.render();
        document.getElementById('nombreReceta').value = "";
        cargarLegado();
    } catch(e) { 
        msg.innerHTML = "❌ Error: " + e.message; 
    }
}

async function cargarLegado() {
    const grid = document.getElementById('grid-recetas');
    if(!grid) return;
    try {
        const recetas = await api.obtenerTodoElLegado();
        grid.innerHTML = recetas.map(r => `
            <div style="background:white; border:2px solid #fed7aa; padding:15px; border-radius:12px; margin-bottom:10px;">
                <div style="font-weight:bold; color:#431407;">${r.nombre.toUpperCase()}</div>
                <div style="font-size:0.8em; color:#666;">Ingredientes: ${r.ingredientes.length} | Pasos: ${r.pasos.length}</div>
            </div>
        `).join('');
    } catch(e) { 
        console.error("Error al cargar:", e); 
    }
}

// 5. INICIO
cargarLegado();

</script>
</body>
</html>
