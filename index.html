<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADN Culinario - Legado Familiar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #c2410c; /* Tierra / Tradición */
            --bg: #fffaf5;
            --card-bg: #ffffff;
            --text: #431407;
            --accent: #fef3c7;
            --border: #fde68a;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .main-container { max-width: 600px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); font-size: 2.2rem; margin: 0; }
        
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .section-title { font-weight: bold; border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 15px; color: var(--primary); }

        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-add { background: #78350f; margin-bottom: 15px; }

        .item-list { font-size: 0.9rem; background: var(--accent); padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); }
        .recipe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .recipe-card { background: white; padding: 15px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; text-align: center; transition: transform 0.1s; }
        .recipe-card:hover { transform: scale(1.02); }

        #pantalla-completa { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
    </style>
</head>
<body>

<div class="main-container" id="app-view">
    <div class="header">
        <h1>ADN Culinario</h1>
        <p>— Preservando el legado familiar —</p>
    </div>

    <div class="card">
        <input type="text" id="buscadorNombre" placeholder="🔍 Buscar receta..." oninput="UI.filtrar()">
    </div>

    <div class="card">
        <div class="section-title">NUEVA RECETA</div>
        <input type="text" id="nombreReceta" placeholder="Nombre (ej: Pan de la Abuela)">
        <select id="categoriaReceta">
            <option value="">Seleccionar Categoría (HU2)</option>
            <option value="Panadería">🥖 Panadería</option>
            <option value="Repostería">🍰 Repostería</option>
            <option value="Salsas">🍯 Salsas</option>
            <option value="Plato Principal">🥘 Plato Principal</option>
        </select>

        <div style="display: flex; gap: 5px;">
            <input type="text" id="ing-nom" placeholder="Ingrediente" style="flex: 2;">
            <input type="number" id="ing-cant" placeholder="Gr/Ml" style="flex: 1;">
            <button class="btn" style="width: 40px;" onclick="App.addIng()">+</button>
        </div>
        <div id="lista-ing" class="item-list" style="display:none;"></div>

        <div class="section-title">PASOS TÉCNICOS</div>
        <select id="paso-tipo" onchange="UI.ajustarCamposPaso()">
            <option value="Amasar">🥣 Amasar</option>
            <option value="Hornear">🔥 Hornear</option>
            <option value="Congelar">❄️ Congelar / Refrigerar</option>
            <option value="Sofreír">🥘 Sofreír / Fuego</option>
            <option value="Reposar">⏳ Reposar</option>
        </select>
        
        <div id="campos-dinamicos">
            <input type="number" id="paso-temp" placeholder="Temperatura °C">
            <select id="paso-intensidad" style="display:none;">
                <option value="">Intensidad de Fuego/Amasado</option>
                <option value="Mínimo">Mínimo</option>
                <option value="Medio">Medio</option>
                <option value="Máximo">Máximo</option>
            </select>
            <input type="number" id="paso-time" placeholder="Minutos">
        </div>
        <button class="btn btn-add" onclick="App.addPaso()">Añadir Paso</button>
        <div id="lista-pasos" class="item-list" style="display:none;"></div>

        <button class="btn" onclick="App.guardarEnNube()">PROTEGER LEGADO (HU1)</button>
        <div id="mensaje" style="text-align:center; font-size: 0.8rem; margin-top: 10px;"></div>
    </div>

    <div class="section-title">EL LEGADO GUARDADO</div>
    <div id="grid-recetas" class="recipe-grid"></div>
</div>

<div id="pantalla-completa">
    <button class="btn btn-add" onclick="UI.cerrarDetalle()" style="width: auto;">⬅ Volver</button>
    <div id="detalle-contenido"></div>
</div>

<script>
    // --- MOTOR DE DATOS (HU1) ---
    const _URL = "TU_URL";
    const _KEY = "TU_KEY";
    const supabase = supabase.createClient(_URL, _KEY);

    const App = {
        recetas: [],
        bIng: [],
        bPasos: [],

        async init() {
            const { data } = await supabase.from('recetas').select('*');
            this.recetas = data || [];
            UI.renderGrid(this.recetas);
        },

        // --- VALIDACIONES HU5 (INTEGRIDAD TOTAL) ---
        addIng() {
            const n = document.getElementById('ing-nom').value;
            const c = parseFloat(document.getElementById('ing-cant').value);
            if(!n || c <= 0) return alert("⚠️ Cantidad > 0 obligatoria.");
            this.bIng.push({ nombre: n, cantidad: c });
            UI.renderBorradores();
        },

        addPaso() {
            const tipo = document.getElementById('paso-tipo').value;
            const temp = parseFloat(document.getElementById('paso-temp').value) || 0;
            const time = parseInt(document.getElementById('paso-time').value) || 0;
            const int = document.getElementById('paso-intensidad').value;

            // Recobrando validaciones del index.html original
            if(tipo === "Hornear" && (temp < 1 || temp > 500 || time <= 0)) 
                return alert("⚠️ Hornear: 1-500°C y tiempo obligatorio.");
            
            if(tipo === "Congelar" && (temp < -50 || temp > 15 || time <= 0))
                return alert("⚠️ Frío: -50 a 15°C y tiempo obligatorio.");

            if(["Sofreír", "Amasar"].includes(tipo) && time <= 0)
                return alert("⚠️ Tiempo obligatorio para Timers.");

            this.bPasos.push({ tipo, temperatura: temp, tiempo: time, intensidad: int });
            UI.renderBorradores();
        },

        async guardarEnNube() {
            const nom = document.getElementById('nombreReceta').value;
            const cat = document.getElementById('categoriaReceta').value;
            if(!nom || !cat || this.bIng.length === 0) return alert("⚠️ Datos incompletos.");
            
            document.getElementById('mensaje').innerText = "⏳ Sincronizando...";
            const { data, error } = await supabase.from('recetas').insert([{ nombre: nom, categoria: cat }]).select();
            
            if(!error) {
                document.getElementById('mensaje').innerText = "✅ Legado Protegido.";
                this.bIng = []; this.bPasos = [];
                this.init();
            }
        }
    };

    // --- MOTOR DE INTERFAZ (HU7) ---
    const UI = {
        renderGrid(lista) {
            const grid = document.getElementById('grid-recetas');
            grid.innerHTML = lista.map(r => `
                <div class="recipe-card" onclick="UI.ver('${r.id}')">
                    <div style="font-size: 0.7rem; color: var(--primary);">${r.categoria}</div>
                    <strong>${r.nombre}</strong>
                </div>
            `).join('');
        },

        renderBorradores() {
            const li = document.getElementById('lista-ing');
            const lp = document.getElementById('lista-pasos');
            li.style.display = App.bIng.length ? 'block' : 'none';
            lp.style.display = App.bPasos.length ? 'block' : 'none';
            li.innerHTML = App.bIng.map(i => `• ${i.nombre} (${i.cantidad})`).join('<br>');
            lp.innerHTML = App.bPasos.map(p => `• ${p.tipo} - ${p.tiempo}min`).join('<br>');
        },

        ajustarCamposPaso() {
            const tipo = document.getElementById('paso-tipo').value;
            document.getElementById('paso-temp').style.display = ["Hornear", "Congelar", "Sofreír"].includes(tipo) ? 'block' : 'none';
            document.getElementById('paso-intensidad').style.display = ["Amasar", "Sofreír"].includes(tipo) ? 'block' : 'none';
        },

        filtrar() {
            const t = document.getElementById('buscadorNombre').value.toLowerCase();
            App.recetas && this.renderGrid(App.recetas.filter(r => r.nombre.toLowerCase().includes(t)));
        },

        ver(id) {
            const r = App.recetas.find(x => x.id == id);
            document.getElementById('app-view').style.display = 'none';
            document.getElementById('pantalla-completa').style.display = 'block';
            document.getElementById('detalle-contenido').innerHTML = `<h2>${r.nombre}</h2><p>Categoría: ${r.categoria}</p>`;
        },

        cerrarDetalle() {
            document.getElementById('pantalla-completa').style.display = 'none';
            document.getElementById('app-view').style.display = 'block';
        }
    };

    App.init();
</script>
</body>
</html>
