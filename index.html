<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADN Culinario | Sistema de Élite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfaf8; }
        .recipe-card:hover { transform: translateY(-3px); transition: all 0.2s; }
        /* Ocultar advertencia de Tailwind CDN */
        .nt-warning { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-3xl mx-auto" id="main-view">
    <header class="text-center mb-10">
        <h1 class="text-5xl font-extrabold text-stone-900 tracking-tighter italic">ADN Culinario</h1>
        <p class="text-amber-700 font-medium mt-2 text-lg">Protección del Legado Gastronómico</p>
    </header>

    <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-stone-100 mb-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div>
                <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Nombre de la Receta</label>
                <input type="text" id="rec-nom" class="w-full border-b-2 border-stone-100 py-2 outline-none focus:border-amber-500" placeholder="Ej: Masa Madre 1940">
            </div>
            <div>
                <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Categoría (HU2)</label>
                <select id="rec-cat" class="w-full border-b-2 border-stone-100 py-2 outline-none bg-transparent">
                    <option value="Panadería">🥖 Panadería</option>
                    <option value="Salsas">🍯 Salsas</option>
                    <option value="Principal">🥘 Plato Principal</option>
                    <option value="Repostería">🍰 Repostería</option>
                    <option value="Entrantes">🥗 Entrantes</option>
                </select>
            </div>
        </div>

        <div class="mb-8">
            <h3 class="text-sm font-bold text-stone-800 mb-3 uppercase tracking-wider flex items-center gap-2">
                <span class="w-2 h-2 bg-amber-500 rounded-full"></span> 📝 Ingredientes
            </h3>
            <div class="flex gap-2">
                <input type="text" id="ing-nom" placeholder="Ingrediente" class="flex-grow bg-stone-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-amber-200 transition-all">
                <input type="number" id="ing-cant" placeholder="0" class="w-20 bg-stone-50 p-3 rounded-xl outline-none">
                <select id="ing-uni" class="w-24 bg-stone-100 p-3 rounded-xl outline-none font-bold text-stone-600">
                    <option value="gr">gr</option>
                    <option value="ml">ml</option>
                    <option value="kg">kg</option>
                    <option value="l">l</option>
                    <option value="pizca">pizca</option>
                </select>
                <button onclick="App.addIng()" class="bg-stone-900 text-white px-5 rounded-xl hover:bg-amber-600 transition-colors font-bold text-xl">+</button>
            </div>
            <div id="lista-ing" class="mt-4 flex flex-wrap gap-2"></div>
        </div>

        <div class="mb-10 bg-stone-50 p-6 rounded-2xl border border-stone-100">
            <h3 class="text-sm font-bold text-stone-800 mb-3 uppercase tracking-wider">⚙️ Ingeniería de Pasos</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                <select id="pas-tipo" class="p-3 rounded-xl outline-none border border-stone-200 bg-white" onchange="App.toggleCampos()">
                    <option value="Amasar">🥣 Amasar</option>
                    <option value="Hornear">🔥 Hornear</option>
                    <option value="Congelar">❄️ Congelar / Refrigerar</option>
                    <option value="Fuego">🥘 Fuego (Sofreír/Hervir)</option>
                    <option value="Reposar">⏳ Reposar</option>
                </select>
                <div class="flex gap-2">
                    <input type="number" id="pas-temp" placeholder="Temp °C" class="w-1/2 p-3 rounded-xl border border-stone-200 bg-white outline-none focus:border-amber-500">
                    <input type="number" id="pas-time" placeholder="Min" class="w-1/2 p-3 rounded-xl border border-stone-200 bg-white outline-none focus:border-amber-500">
                </div>
            </div>
            <button onclick="App.addPaso()" class="w-full bg-stone-200 text-stone-700 font-bold p-3 rounded-xl hover:bg-stone-300 transition-all">
