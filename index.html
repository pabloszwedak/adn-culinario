<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADN Culinario - HU5 Estandarización</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff5ed; padding: 20px; color: #431407; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { color: #f97316; text-align: center; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #fed7aa; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #f97316; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .badge { text-align: center; font-size: 0.8em; color: #a3442d; background: #fed7aa; border-radius: 5px; padding: 5px; margin-bottom: 15px; }
        .list-item { background: #fff5ed; padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 0.9em; border-left: 4px solid #f97316; display: flex; justify-content: space-between; align-items: center; }
        .tech-box { border: 1px solid #ea580c; padding: 15px; border-radius: 12px; margin-bottom: 20px; background: #fffaf5; }
    </style>
</head>
<body>
	<div class="container">
		<h1>🍳 ADN Culinario Pro</h1>
		<div class="badge">HU5: ESTANDARIZACIÓN UNIVERSAL</div>
		
		<input type="text" id="nombreReceta" placeholder="Nombre de la Receta">

		<div style="border: 1px solid #fed7aa; padding: 15px; border-radius: 12px; margin-bottom: 20px; background: #fffaf5;">
			<p style="font-weight: bold; color: #f97316;">📦 INGREDIENTES</p>
			<div id="lista-ing-borrador"></div>
			<div style="display: flex; gap: 5px; margin-top: 10px;">
				<input type="number" id="ing-cant" placeholder="Cant." style="width: 80px;">
				<select id="ing-unidad" style="width: 80px;">
					<option value="g">g</option>
					<option value="ml">ml</option>
					<option value="ud">ud</option>
				</select>
				<input type="text" id="ing-nombre" placeholder="Ingrediente..." style="flex: 1;">
				<button onclick="ui.agregarIngrediente()" style="width: 45px; background: #431407;">+</button>
			</div>
		</div>

		<div class="tech-box">
			<p style="font-weight: bold; color: #ea580c;">🔥 TÉCNICA Y PARÁMETROS</p>
			<div id="lista-pasos-borrador"></div>

			<select id="paso-tipo" onchange="ui.ajustarInterfazPaso()" style="background: #fff; font-weight: bold;">
				<optgroup label="Hornos y Frío">
					<option value="hornear">🔥 Hornear</option>
					<option value="congelar">❄️ Congelar / Refrigerar</option>
				</optgroup>
				<optgroup label="Vitrocerámica / Fuego">
					<option value="sofreir">🥘 Sofreír</option>
					<option value="plancha">✨ Plancha</option>
					<option value="hervir">💧 Hervir / Cocer</option>
					<option value="freir">🍳 Freír</option>
					<option value="guisar">🍲 Guisar / Chup-chup</option>
				</optgroup>
				<optgroup label="Mecánicos">
					<option value="batir">🥣 Batir / Mezclar</option>
					<option value="reposar">⏳ Reposar</option>
					<option value="amasar">🥖 Amasar</option> 
				</optgroup>
			</select>

			<input type="text" id="paso-inst" placeholder="Instrucción detallada (opcional si hay parámetros)">
			
			<div style="display: flex; gap: 5px;">
				<input type="number" id="paso-temp" placeholder="ºC" style="width: 100px;">
				
				<select id="paso-intensidad" style="display: none; flex: 1;">
					<option value="">-- Intensidad --</option>
					<option value="Fuego Mínimo">Fuego Mínimo</option>
					<option value="Fuego Suave">Fuego Suave</option>
					<option value="Fuego Medio">Fuego Medio</option>
					<option value="Fuego Fuerte">Fuego Fuerte</option>
					<option value="Fuego Máximo">Fuego Máximo</option>
				</select>

				<input type="number" id="paso-tiempo" placeholder="min" style="width: 80px;">
				<button onclick="ui.agregarPaso()" style="width: 45px; background: #431407;">+</button>
			</div>
		</div>
		
		<button onclick="guardarReceta()" style="height: 50px;">💾 GUARDAR EN EL LEGADO</button>
		<div id="mensaje" style="text-align:center; margin-top:10px;"></div>
		<div id="grid-recetas" style="margin-top:20px;"></div>
		
		<div id="pantalla-completa" style="display: none; padding-top: 10px;">
			<button onclick="ui.cerrarReceta()" style="background: #431407; margin-bottom: 20px;">⬅️ VOLVER AL LISTADO</button>
			<div id="contenido-receta"></div>
		</div>
    </div>
	</div>
	<script>
		const SB_URL = 'https://tsmbobfnvforggaajurw.supabase.co'; 
		const SB_KEY = 'sb_publishable_z7-wVRQ1qGgPOHs6GIhDeg_A5L3wQD_';
		const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

		let borradorIngredientes = [];
		let borradorPasos = [];

		const api = {
			async guardarRecetaCompleta(nombre, ingredientes, pasos) {
				const { data: receta, error: rError } = await supabaseClient.from('recetas').insert([{ nombre }]).select().single();
				if (rError) throw rError;
				const ingData = ingredientes.map(i => ({ ...i, receta_id: receta.id }));
				await supabaseClient.from('ingredientes').insert(ingData);
				const pasosData = pasos.map((p, idx) => ({ ...p, receta_id: receta.id, orden: idx }));
				await supabaseClient.from('pasos').insert(pasosData);
				return receta;
			},
			async obtenerTodoElLegado() {
				const { data, error } = await supabaseClient.from('recetas').select(`id, nombre, created_at, ingredientes(*), pasos(*)`).order('created_at', { ascending: false });
				if (error) throw error; return data;
			}
		};

		const ui = {
			ajustarInterfazPaso() {
				const tipo = document.getElementById('paso-tipo').value;
				const inputTemp = document.getElementById('paso-temp');
				const selectIntensidad = document.getElementById('paso-intensidad');
				
				inputTemp.style.display = "none";
				selectIntensidad.style.display = "none";

				if (tipo === 'hornear' || tipo === 'congelar') {
					inputTemp.style.display = "block";
					inputTemp.placeholder = "ºC";
				} else if (['sofreir', 'plancha', 'hervir', 'freir', 'guisar'].includes(tipo)) {
					selectIntensidad.style.display = "block";
					this.cargarOpcionesIntensidad("fuego");
				} else if (tipo === 'amasar') {
					selectIntensidad.style.display = "block";
					this.cargarOpcionesIntensidad("amasado");
				}
			},

			cargarOpcionesIntensidad(modo) {
				const select = document.getElementById('paso-intensidad');
				if (modo === "fuego") {
					select.innerHTML = `
						<option value="">-- Intensidad Fuego --</option>
						<option value="Fuego Mínimo">Fuego Mínimo</option>
						<option value="Fuego Suave">Fuego Suave</option>
						<option value="Fuego Medio">Fuego Medio</option>
						<option value="Fuego Fuerte">Fuego Fuerte</option>
						<option value="Fuego Máximo">Fuego Máximo</option>`;
				} else if (modo === "amasado") {
					select.innerHTML = `
						<option value="">-- Tipo de Amasado --</option>
						<option value="Integrar">Amasado (Integrar)</option>
						<option value="Intenso">Amasado (Intenso)</option>`;
				}
			},

			agregarIngrediente() {
				const n = document.getElementById('ing-nombre').value;
				const c = parseFloat(document.getElementById('ing-cant').value);
				const u = document.getElementById('ing-unidad').value;
				if(!n) { alert("⚠️ Nombre de ingrediente vacío"); return; }
				if(isNaN(c) || c <= 0) { alert(`⚠️ Cantidad de "${n}" no válida`); return; }
				borradorIngredientes.push({ nombre: n, cantidad: c, unidad: u });
				this.render();
				document.getElementById('ing-nombre').value = ""; 
				document.getElementById('ing-cant').value = "";
			},

			agregarPaso() {
				const tipo = document.getElementById('paso-tipo').value;
				let inst = document.getElementById('paso-inst').value;
				const temp = document.getElementById('paso-temp').value;
				const intensidad = document.getElementById('paso-intensidad').value;
				const tiempo = document.getElementById('paso-tiempo').value;

				const esVitro = ['sofreir', 'plancha', 'hervir', 'freir', 'guisar'].includes(tipo);
				const tieneTiempo = (tiempo && tiempo > 0);

				if ((esVitro || tipo === 'amasar') && !intensidad) {
					alert("⚠️ Selecciona la intensidad o tipo de amasado");
					return;
				}

				const necesitaTiempoSiempre = (tipo === 'hornear' || tipo === 'congelar' || tipo === 'reposar' || intensidad === 'Intenso');
				if (necesitaTiempoSiempre && !tieneTiempo) {
					alert(`⚠️ El tiempo es obligatorio para: ${tipo.toUpperCase()} (${intensidad || ''})`);
					return;
				}

				if (!inst && !tieneTiempo && !intensidad && !temp) {
					alert("⚠️ El paso no tiene ADN suficiente");
					return;
				}

				const instruccionFinal = inst.trim() === "" ? tipo.toUpperCase() : inst;

				borradorPasos.push({
					instruccion: `[${tipo.toUpperCase()}] ${instruccionFinal}`,
					temperatura: (!esVitro && tipo !== 'amasar' && temp) ? temp : null,
					intensidad: (esVitro || tipo === 'amasar') ? intensidad : null,
					tiempo: tieneTiempo ? tiempo : null
				});

				this.render();
				document.getElementById('paso-inst').value = "";
				document.getElementById('paso-temp').value = "";
				document.getElementById('paso-tiempo').value = "";
				document.getElementById('paso-intensidad').value = "";
			},

			render() {
				document.getElementById('lista-ing-borrador').innerHTML = borradorIngredientes.map((i, idx) => 
					`<div class="list-item"><span>🔹 ${i.cantidad}${i.unidad} - ${i.nombre}</span><span onclick="ui.quitarIng(${idx})" style="cursor:pointer">🗑️</span></div>`).join('');
				
				document.getElementById('lista-pasos-borrador').innerHTML = borradorPasos.map((p, idx) => {
					let detalles = [];
					if (p.temperatura) detalles.push(`${p.temperatura}°C`);
					if (p.intensidad) detalles.push(p.intensidad);
					if (p.tiempo) detalles.push(`${p.tiempo} min`);
					const stringDetalles = detalles.length > 0 ? `(${detalles.join(' | ')})` : '';
					return `<div class="list-item"><span>⏱️ ${p.instruccion} ${stringDetalles}</span><span onclick="ui.quitarPaso(${idx})" style="cursor:pointer">🗑️</span></div>`;
				}).join('');
			},

			quitarIng(idx) { borradorIngredientes.splice(idx, 1); this.render(); },
			
			quitarPaso(idx) { borradorPasos.splice(idx, 1); this.render(); }, // <-- Coma añadida aquí
			
			mostrarReceta(id) {
				api.obtenerTodoElLegado().then(recetas => {
					const r = recetas.find(rec => rec.id === id);
					if(!r) return;

					document.querySelectorAll('.container > *:not(#pantalla-completa)').forEach(el => el.style.display = 'none');
					const pc = document.getElementById('pantalla-completa');
					const cont = document.getElementById('contenido-receta');
					pc.style.display = 'block';

					cont.innerHTML = `
						<h2 style="color: #f97316; font-size: 1.8em; margin-bottom:5px;">${r.nombre.toUpperCase()}</h2>
						<div style="background: #fffaf5; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #fed7aa;">
							<p style="font-weight: bold; margin-top:0; color: #431407;">🛒 INGREDIENTES</p>
							<ul style="list-style: none; padding: 0; margin:0;">
								${r.ingredientes.map(i => `<li style="margin-bottom: 5px;">⬜ ${i.cantidad}${i.unidad} ${i.nombre}</li>`).join('')}
							</ul>
						</div>
						<div style="background: white;">
							<p style="font-weight: bold; color: #ea580c; border-bottom: 2px solid #fed7aa; padding-bottom:5px;">👨‍🍳 PASO A PASO</p>
							${r.pasos.map((p, idx) => {
								const tieneTimer = p.tiempo && p.tiempo > 0;
								const btnTimer = tieneTimer ? 
									`<button id="btn-timer-${idx}" onclick="ui.iniciarTimer(${idx}, ${p.tiempo})" style="width:auto; display:inline-block; padding: 5px 10px; margin-top:5px; background:#431407; font-size:0.8em;">▶️ Iniciar ${p.tiempo} min</button>` : '';
								
								return `
								<div id="paso-card-${idx}" style="margin-bottom: 20px; padding: 10px; border-left: 4px solid #f97316; background:#fffaf5; border-radius:0 8px 8px 0;">
									<div style="font-weight: bold; font-size:0.8em; color:#f97316;">PASO ${idx + 1}</div>
									<div style="font-size: 1.1em; color:#431407; margin: 5px 0;">${p.instruccion}</div>
									<div style="font-size: 0.85em; font-weight: bold; color: #a3442d;">
										${p.temperatura ? `🌡️ ${p.temperatura}°C ` : ''}
										${p.intensidad ? `🔥 ${p.intensidad} ` : ''}
										${p.tiempo ? `⏱️ <span id="timer-display-${idx}">${p.tiempo}:00</span>` : ''}
									</div>
									${btnTimer}
								</div>`;
							}).join('')}
						</div>
					`;
				});
			},

			iniciarTimer(idx, minutos) {
				let segundosTotales = minutos * 60;
				const display = document.getElementById(`timer-display-${idx}`);
				const btn = document.getElementById(`btn-timer-${idx}`);
				const card = document.getElementById(`paso-card-${idx}`);
				
				btn.disabled = true;
				btn.style.opacity = "0.5";
				btn.innerText = "⏳ En curso...";

				const intervalo = setInterval(() => {
					segundosTotales--;
					const m = Math.floor(segundosTotales / 60);
					const s = segundosTotales % 60;
					display.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;

					if (segundosTotales <= 0) {
						clearInterval(intervalo);
						display.innerText = "✅ ¡TIEMPO CUMPLIDO!";
						card.style.background = "#ffedd5"; 
						card.style.borderColor = "#ea580c";
						alert(`🔔 ¡Paso ${idx + 1} finalizado!`);
					}
				}, 1000);
			},

			cerrarReceta() {
				document.getElementById('pantalla-completa').style.display = 'none';
				document.querySelectorAll('.container > *:not(#pantalla-completa)').forEach(el => el.style.display = 'block');
				document.getElementById('grid-recetas').style.display = 'block';
			}
		}; // <-- El objeto ui se cierra correctamente aquí

		async function guardarReceta() {
			const msg = document.getElementById('mensaje');
			const nombre = document.getElementById('nombreReceta').value;
			if(!nombre || borradorIngredientes.length === 0) { alert("Faltan datos"); return; }
			try {
				msg.innerHTML = "⏳ Sincronizando ADN...";
				const receta = await api.guardarRecetaCompleta(nombre, borradorIngredientes, borradorPasos);
				msg.innerHTML = "✅ Legado Protegido";
				borradorIngredientes = []; borradorPasos = []; ui.render();
				document.getElementById('nombreReceta').value = "";
				cargarLegado();
			} catch(e) { msg.innerHTML = "❌ Error: " + e.message; }
		}

		async function cargarLegado() {
			try {
				const recetas = await api.obtenerTodoElLegado();
				document.getElementById('grid-recetas').innerHTML = recetas.map(r => `
					<div onclick="ui.mostrarReceta('${r.id}')" style="background:white; border:1px solid #fed7aa; padding:15px; border-radius:12px; margin-bottom:10px; cursor:pointer; display: flex; justify-content: space-between; align-items: center;">
						<div>
							<b style="color: #431407;">${r.nombre.toUpperCase()}</b><br>
							<span style="font-size: 0.75em; color: #a3442d;">${r.ingredientes.length} ing. | ${r.pasos.length} pasos</span>
						</div>
						<span style="color: #f97316;">➔</span>
					</div>
				`).join('');
			} catch(e) { console.error(e); }
		}

		ui.ajustarInterfazPaso();
		cargarLegado();
	</script>
</body>
</html>
