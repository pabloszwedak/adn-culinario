<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADN Culinario | v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfaf8; color: #1c1917; }
        .btn-active:active { transform: scale(0.98); }
        .error-anim { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="p-4 md:p-10">
<div class="max-w-3xl mx-auto">
    <header class="text-center mb-10">
        <h1 class="text-5xl font-extrabold text-stone-900 tracking-tighter italic">ADN Culinario</h1>
        <p class="text-amber-600 font-medium mt-2 text-sm tracking-widest uppercase italic">Sistema de Ingeniería Gastronómica</p>
    </header>

    <div id="ui-feedback" class="hidden mb-6 p-4 rounded-2xl bg-amber-50 border border-amber-200 text-amber-800 text-xs font-bold uppercase tracking-widest text-center shadow-sm"></div>

    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-stone-100 mb-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <div>
                <label class="text-[10px] font-black text-stone-300 uppercase tracking-widest mb-2 block">Nombre de la Receta</label>
                <input type="text" id="rec-nom" class="w-full border-b border-stone-200 py-3 outline-none focus:border-amber-600 font-semibold transition-colors" placeholder="Ej: Pan de Masa Madre">
            </div>
            <div>
                <label class="text-[10px] font-black text-stone-300 uppercase tracking-widest mb-2 block">Categoría</label>
                <select id="rec-cat" class="w-full border-b border-stone-200 py-3 outline-none bg-transparent font-bold text-stone-500">
                    <option value="">Seleccionar Categoría</option>
                    <option value="Panadería">🥖 Panadería</option>
                    <option value="Salsas">🍯 Salsas</option>
                    <option value="Plato Principal">🥘 Plato Principal</option>
                    <option value="Entrantes">🥗 Entrantes</option>
                </select>
            </div>
        </div>

        <div class="mb-8 p-6 rounded-3xl border border-stone-100 bg-stone-50/50">
            <h3 class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-4 italic">📝 Ingredientes</h3>
            <div class="flex gap-3 mb-4">
                <input type="text" id="ing-nom" placeholder="Ingrediente" class="flex-[3] p-4 rounded-2xl border border-stone-200 outline-none text-sm bg-white shadow-sm">
                <input type="number" id="ing-cant" min="0.1" step="0.1" placeholder="Cantidad" class="flex-1 p-4 rounded-2xl border border-stone-200 outline-none text-sm text-center bg-white shadow-sm">
                <select id="ing-uni" class="w-24 p-4 rounded-2xl border border-stone-200 bg-white font-bold text-xs outline-none">
                    <option value="gr">gr</option>
                    <option value="ml">ml</option>
                    <option value="pz">pz</option>
                </select>
                <button onclick="App.addIng()" class="bg-stone-900 text-white w-14 rounded-2xl hover:bg-stone-700 transition-all font-bold text-xl btn-active">+</button>
            </div>
            <div id="lista-ing" class="flex flex-wrap gap-2"></div>
        </div>

        <div class="mb-10 p-6 rounded-3xl border border-stone-100 bg-stone-50/50">
            <h3 class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-4 italic">⚙️ Pasos</h3>
            <input type="text" id="paso-desc" placeholder="Detalle el paso" class="w-full p-4 mb-4 rounded-2xl border border-stone-200 outline-none shadow-sm bg-white focus:border-amber-600">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <select id="paso-tipo" onchange="App.uiAjustar()" class="p-4 rounded-2xl border border-stone-200 font-bold bg-white text-sm outline-none shadow-sm">
                    <option value="hornear">🔥 Hornear</option>
                    <option value="congelar">❄️ Congelar</option>
                    <option value="sofreir">🥘 Sofreír / Fuego</option>
                    <option value="amasar">🥖 Amasar</option>
                    <option value="batir">🥣 Batir / Mezclar</option>
                    <option value="reposar">⏳ Reposar</option>
                </select>
                <div class="flex gap-2">
                    <div id="wrapper-int" class="flex-grow">
                        <select id="paso-int" class="w-full p-4 rounded-2xl border border-stone-200 bg-white font-bold text-amber-700 text-xs outline-none shadow-sm"></select>
                    </div>
                    <div id="wrapper-temp" class="flex-grow"><input type="number" id="paso-temp" placeholder="°C" class="w-full p-4 rounded-2xl border border-stone-200 outline-none text-center bg-white shadow-sm font-bold"></div>
                    <div id="wrapper-time" class="w-24"><input type="number" id="paso-time" placeholder="Min" class="w-full p-4 rounded-2xl border border-stone-200 outline-none font-bold text-center bg-white shadow-sm"></div>
                </div>
            </div>
            <button onclick="App.addPaso()" class="w-full bg-stone-900 text-white font-bold py-4 rounded-2xl hover:bg-amber-600 transition-all btn-active shadow-lg uppercase tracking-widest text-xs">Añadir Paso</button>
            <div id="lista-pasos" class="mt-6 space-y-3"></div>
        </div>

        <button onclick="App.guardar()" class="w-full bg-amber-600 text-white font-black py-6 rounded-[2rem] hover:bg-amber-700 shadow-xl transition-all btn-active uppercase text-sm tracking-widest">Guardar</button>
        <p id="msg" class="text-center text-[10px] mt-4 text-stone-400 font-black uppercase tracking-widest"></p>
    </div>
</div>

<script>
    const App = {
        bIng: [], bPasos: [],
        init() { this.uiAjustar(); },
        showError(msg, targetId) {
            const el = document.getElementById('ui-feedback');
            el.innerText = `⚠️ ${msg}`; el.classList.remove('hidden'); el.classList.add('error-anim');
            if(targetId) document.getElementById(targetId).focus();
            setTimeout(() => { el.classList.add('hidden'); el.classList.remove('error-anim'); }, 4000);
        },
        addIng() {
            const n = document.getElementById('ing-nom').value.trim();
            const c = parseFloat(document.getElementById('ing-cant').value);
            if(!n) return this.showError("INGREDIENTE REQUERIDO", "ing-nom");
            if(isNaN(c) || c <= 0) return this.showError("CANTIDAD REQUERIDA (>0)", "ing-cant");
            this.bIng.push({ nombre: n, cantidad: c, unidad: document.getElementById('ing-uni').value });
            this.render();
            document.getElementById('ing-nom').value = ""; document.getElementById('ing-cant').value = "";
            document.getElementById('ing-nom').focus();
        },
        uiAjustar() {
            const t = document.getElementById('paso-tipo').value;
            const sInt = document.getElementById('paso-int');
            const wInt = document.getElementById('wrapper-int');
            const wTemp = document.getElementById('wrapper-temp');
            const wTime = document.getElementById('wrapper-time');
            wTemp.style.display = (t === 'hornear' || t === 'congelar') ? "block" : "none";
            wInt.style.display = (t === 'sofreir' || t === 'amasar') ? "block" : "none";
            wTime.style.display = "block";
            if (t === 'amasar') {
                sInt.innerHTML = `<option value="Integrar">Integrar</option><option value="Intenso">Amasado Intenso</option>`;
                sInt.onchange = () => { wTime.style.display = (sInt.value === "Integrar") ? "none" : "block"; };
                sInt.onchange();
            } else if (t === 'sofreir') {
                sInt.innerHTML = `<option value="Fuego Mínimo">Fuego Mínimo</option><option value="Fuego Medio">Fuego Medio</option><option value="Fuego Fuerte">Fuego Fuerte</option>`;
                sInt.onchange = null;
            }
        },
        addPaso() {
            const t = document.getElementById('paso-tipo').value;
            const tiempo = parseInt(document.getElementById('paso-time').value);
            const int = document.getElementById('paso-int').value;
            if((t === 'reposar' || (t === 'amasar' && int === 'Intenso')) && (!tiempo || tiempo <= 0)) return this.showError("TIEMPO REQUERIDO", "paso-time");
            this.bPasos.push({ desc: document.getElementById('paso-desc').value.trim() || "Sin detalle", tipo: t, tiempo: tiempo || 0, int });
            this.render();
            document.getElementById('paso-desc').value = ""; document.getElementById('paso-time').value = "";
            document.getElementById('paso-tipo').selectedIndex = 0; this.uiAjustar();
        },
        movePaso(idx, dir) {
            if(idx+dir < 0 || idx+dir >= this.bPasos.length) return;
            [this.bPasos[idx], this.bPasos[idx+dir]] = [this.bPasos[idx+dir], this.bPasos[idx]];
            this.render();
        },
        render() {
            document.getElementById('lista-ing').innerHTML = this.bIng.map(i => `<span class="bg-white border border-stone-200 px-4 py-2 rounded-xl text-xs font-bold shadow-sm">${i.nombre} <span class="text-amber-600">${i.cantidad}${i.unidad}</span></span>`).join('');
            document.getElementById('lista-pasos').innerHTML = this.bPasos.map((p, idx) => `<div class="bg-white p-4 rounded-2xl border-l-4 border-amber-500 shadow-sm flex justify-between items-center"><div class="text-[11px] font-bold text-stone-500 uppercase"><span class="text-amber-600">${idx+1}.</span> ${p.tipo} | ${p.int || ''} | ${p.tiempo}m <br><span class="normal-case text-stone-400 font-medium italic">${p.desc}</span></div><div class="flex gap-1"><button onclick="App.movePaso(${idx},-1)" class="p-2 bg-stone-100 rounded-lg">↑</button><button onclick="App.movePaso(${idx},1)" class="p-2 bg-stone-100 rounded-lg">↓</button></div></div>`).join('');
        },
        async guardar() {
            if(!document.getElementById('rec-nom').value.trim()) return this.showError("NOMBRE REQUERIDO", "rec-nom");
            if(!document.getElementById('rec-cat').value) return this.showError("CATEGORÍA REQUERIDA", "rec-cat");
            if(this.bIng.length === 0) return this.showError("AÑADA INGREDIENTES", "ing-nom");
            document.getElementById('msg').innerText = "⏳ GUARDANDO...";
            setTimeout(() => {
                document.getElementById('msg').innerText = "✅ Receta Guardada";
                this.bIng = []; this.bPasos = []; document.getElementById('rec-nom').value = "";
                document.getElementById('rec-cat').value = ""; this.render();
                setTimeout(() => document.getElementById('msg').innerText = "", 5000);
            }, 800);
        }
    };
    App.init();
</script>
</body>
</html>
