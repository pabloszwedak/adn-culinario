<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADN Culinario | Ingeniería de Legado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { amber: { 600: '#d97706' } } } } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfaf8; }
        .nt-warning { display: none !important; }
        .btn-active:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-3xl mx-auto">
    <header class="text-center mb-10">
        <h1 class="text-5xl font-extrabold text-stone-900 tracking-tighter italic">ADN Culinario</h1>
        <p class="text-amber-600 font-medium mt-2">v3.0 | Ingeniería de Pasos Estandarizada</p>
    </header>

    <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-stone-100 mb-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 border-b border-stone-50 pb-8">
            <div>
                <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Nombre de la Receta</label>
                <input type="text" id="rec-nom" class="w-full border-b-2 border-stone-100 py-2 outline-none focus:border-amber-600 font-semibold" placeholder="Ej: Masa Madre 1940">
            </div>
            <div>
                <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Categoría (HU2)</label>
                <select id="rec-cat" class="w-full border-b-2 border-stone-100 py-2 outline-none bg-transparent font-bold text-stone-700">
                    <option value="">Seleccionar Categoría</option>
                    <option value="Panadería">🥖 Panadería</option>
                    <option value="Repostería">🍰 Repostería</option>
                    <option value="Salsas">🍯 Salsas</option>
                    <option value="Plato Principal">🥘 Plato Principal</option>
                    <option value="Entrantes">🥗 Entrantes</option>
                </select>
            </div>
        </div>

        <div class="mb-10 bg-stone-50 p-6 rounded-2xl border border-stone-100">
            <h3 class="text-xs font-black text-stone-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-amber-500 rounded-full"></span> ⚙️ Configuración de Paso Técnico
            </h3>
            
            <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1 block">Detalle del Paso</label>
            <input type="text" id="paso-desc" placeholder="¿Qué hay que hacer? (Detalle técnico del paso)" 
                   class="w-full p-3 mb-4 rounded-xl border border-stone-200 outline-none focus:border-amber-600 shadow-sm">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1 block">Técnica</label>
                    <select id="paso-tipo" onchange="App.uiAjustar()" class="w-full p-3 rounded-xl border border-stone-200 font-bold bg-white text-sm outline-none">
                        <optgroup label="Hornos y Frío">
                            <option value="hornear">🔥 Hornear</option>
                            <option value="congelar">❄️ Congelar / Refrigerar</option>
                        </optgroup>
                        <optgroup label="Vitrocerámica / Fuego">
                            <option value="sofreir">🥘 Sofreír</option>
                            <option value="plancha">✨ Plancha</option>
                            <option value="hervir">💧 Hervir / Cocer</option>
                            <option value="freir">🍳 Freír</option>
                            <option value="guisar">🍲 Guisar / Chup-chup</option>
                        </optgroup>
                        <optgroup label="Mecánicos">
                            <option value="batir">🥣 Batir / Mezclar</option>
                            <option value="reposar">⏳ Reposar</option>
                            <option value="amasar">🥖 Amasar</option> 
                        </optgroup>
                    </select>
                </div>

                <div class="flex gap-2 items-end">
                    <div id="wrapper-temp" class="flex-grow">
                        <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1 block text-center">Temp °C</label>
                        <input type="number" id="paso-temp" placeholder="0" class="w-full p-3 rounded-xl border border-stone-200 outline-none text-center">
                    </div>
                    
                    <div id="wrapper-int" class="flex-grow" style="display: none;">
                        <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1 block text-center italic">Potencia</label>
                        <select id="paso-intensidad" class="w-full p-3 rounded-xl border border-stone-200 bg-white font-bold text-amber-700 text-xs outline-none">
                            <option value="">-- Intensidad --</option>
                            <option value="Fuego Mínimo">Fuego Mínimo</option>
                            <option value="Fuego Suave">Fuego Suave</option>
                            <option value="Fuego Medio">Fuego Medio</option>
                            <option value="Fuego Fuerte">Fuego Fuerte</option>
                            <option value="Fuego Máximo">Fuego Máximo</option>
                        </select>
                    </div>

                    <div class="w-24 text-center">
                        <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1 block">Min</label>
                        <input type="number" id="paso-time" placeholder="0" class="w-full p-3 rounded-xl border border-stone-200 outline-none font-bold text-stone-700">
                    </div>
                </div>
            </div>
            <button onclick="App.addPaso()" class="w-full bg-stone-900 text-white font-bold p-3 rounded-xl hover:bg-amber-600 transition-all btn-active shadow-lg">Añadir Paso al Proceso</button>
            
            <div id="lista-pasos" class="mt-4 space-y-2"></div>
        </div>

        <button onclick="App.guardar()" class="w-full bg-amber-600 text-white font-black py-5 rounded-2xl hover:bg-amber-700 shadow-xl shadow-amber-100 transition-all btn-active uppercase tracking-widest">
            Sincronizar Legado en Supabase
        </button>
        <p id="msg" class="text-center text-xs mt-4 text-stone-400 font-bold uppercase tracking-tighter"></p>
    </div>

    <div class="flex items-center gap-4 mb-6">
        <h2 class="text-2xl font-bold text-stone-800 italic">Archivo del Legado</h2>
        <div class="flex-grow h-[1px] bg-stone-200"></div>
    </div>
    <div id="grid-recetas" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
</div>

<script>
    // CREDENCIALES UNIFICADAS
    const SB_URL = 'https://tsmbobfnvforggaajurw.supabase.co';
    const SB_KEY = 'sb_publishable_z7-wVRQ1qGgPOHs6GIhDeg_A5L3wQD_';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const App = {
        recetas: [],
        bPasos: [],

        async init() {
            try {
                const { data, error } = await supabaseClient.from('recetas').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                this.recetas = data || [];
                this.renderGrid();
            } catch(e) { console.error("Fallo de conexión:", e.message); }
            this.uiAjustar(); // Inicializar interfaz
        },

        uiAjustar() {
            const tipo = document.getElementById('paso-tipo').value;
            const wInt = document.getElementById('wrapper-int');
            const wTemp = document.getElementById('wrapper-temp');

            // Lógica de visibilidad HU5 v1.5
            const esVitro = ["sofreir", "plancha", "hervir", "freir", "guisar"].includes(tipo);
            const esAmasar = (tipo === "amasar");
            const esTermico = ["hornear", "congelar"].includes(tipo);

            wInt.style.display = (esVitro || esAmasar) ? "block" : "none";
            wTemp.style.display = esTermico ? "block" : "none";
        },

        addPaso() {
            const desc = document.getElementById('paso-desc').value.trim();
            const tipo = document.getElementById('paso-tipo').value;
            const tiempo = parseInt(document.getElementById('paso-time').value);
            const intensidad = document.getElementById('paso-intensidad').value;
            const temp = parseFloat(document.getElementById('paso-temp').value) || 0;

            // VALIDACIONES MAESTRAS HU5
            if (!desc) { alert("⚠️ DETALLE: Describe la acción técnica del paso."); return; }
            
            if ((tipo === 'reposar' || tipo === 'amasar') && (isNaN(tiempo) || tiempo <= 0)) {
                alert(`⚠️ ${tipo.toUpperCase()}: Esta técnica requiere definir el tiempo.`); return;
            }

            const esVitro = ["sofreir", "plancha", "hervir", "freir", "guisar"].includes(tipo);
            if (esVitro && !intensidad) {
                alert("⚠️ FUEGO: Selecciona la intensidad de la vitrocerámica."); return;
            }

            if (tipo === 'hornear' && (temp < 1 || temp > 500)) {
                alert("⚠️ HORNEAR: Rango 1-500°C requerido."); return;
            }

            this.bPasos.push({ desc, tipo, tiempo, intensidad, temp });
            this.renderListaPasos();
            
            // Limpiar campos de paso
            document.getElementById('paso-desc').value = "";
            document.getElementById('paso-time').value = "";
        },

        renderListaPasos() {
            const lista = document.getElementById('lista-pasos');
            lista.innerHTML = this.bPasos.map((p, idx) => `
                <div class="bg-white p-3 rounded-xl border border-stone-200 text-[11px] font-bold shadow-sm flex justify-between items-center">
                    <div>
                        <span class="text-amber-700 uppercase">${p.tipo}</span>
                        <span class="text-stone-400 mx-2">|</span>
                        <span class="text-stone-600 italic font-medium">${p.desc}</span>
                    </div>
                    <div class="bg-stone-100 px-2 py-1 rounded text-stone-500">
                        ${p.intensidad ? p.intensidad : p.temp + '°C'} | ${p.tiempo} min
                    </div>
                </div>
            `).join('');
        },

        renderGrid() {
            const grid = document.getElementById('grid-recetas');
            grid.innerHTML = this.recetas.map(r => `
                <div class="bg-white p-6 rounded-[2rem] border border-stone-100 shadow-sm hover:shadow-lg transition-all cursor-pointer">
                    <span class="text-[10px] font-black text-amber-600 bg-amber-50 px-2 py-1 rounded border border-amber-100 uppercase">${r.categoria}</span>
                    <h3 class="text-xl font-bold text-stone-800 mt-2">${r.nombre}</h3>
                </div>
            `).join('');
        },

        async guardar() {
            const n = document.getElementById('rec-nom').value.trim();
            const c = document.getElementById('rec-cat').value;
            if(!n || !c || this.bPasos.length === 0) { alert("⚠️ Datos incompletos (Nombre, Categoría o Pasos)."); return; }

            document.getElementById('msg').innerText = "⏳ PROTEGIENDO ADN...";
            const { error } = await supabaseClient.from('recetas').insert([{ nombre: n, categoria: c }]);
            
            if(!error) {
                document.getElementById('msg').innerText = "✅ SINCRO EXITOSA";
                this.bPasos = [];
                document.getElementById('rec-nom').value = "";
                this.renderListaPasos();
                this.init();
            } else {
                document.getElementById('msg').innerText = "⚠️ FALLO AL GUARDAR";
            }
        }
    };

    App.init();
</script>
</body>
</html>
