<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADN Culinario - Base de Datos Activa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff5ed; padding: 20px; color: #431407; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { color: #f97316; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #fed7aa; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #f97316; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ea580c; }
        #mensaje { margin-top: 15px; text-align: center; font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>
	<div class="container">
		<h1>🍳 ADN Culinario Pro</h1>
		<div class="badge">MODO: MVP2 - DISEÑO DINÁMICO</div>
		
		<input type="text" id="nombreReceta" placeholder="Nombre de la Receta (ej. Bizcocho)">

		<div style="border: 1px solid #fed7aa; padding: 15px; border-radius: 12px; margin-bottom: 20px; background: #fffaf5;">
			<p style="font-weight: bold; margin: 0 0 10px 0; color: #f97316;">📦 INGREDIENTES EN BORRADOR</p>
			<div id="lista-ing-borrador" style="margin-bottom: 10px;"></div> <div style="display: flex; gap: 5px;">
				<input type="number" id="ing-cant" placeholder="Cant." style="width: 70px;">
				<input type="text" id="ing-nombre" placeholder="Ingrediente..." style="flex: 1;">
				<button onclick="ui.agregarIngrediente()" style="width: 45px; background: #431407;">+</button>
			</div>
		</div>

		<div style="border: 1px solid #ea580c; padding: 15px; border-radius: 12px; margin-bottom: 20px; background: #fffaf5;">
			<p style="font-weight: bold; margin: 0 0 10px 0; color: #ea580c;">🔥 PASOS TÉCNICOS</p>
			<div id="lista-pasos-borrador" style="margin-bottom: 10px;"></div>

			<select id="paso-tipo" onchange="ui.ajustarCamposPaso()" style="margin-bottom: 10px; background: #fff;">
				<option value="batir">🥣 Batir / Mezclar</option>
				<option value="hornear">🔥 Hornear</option>
				<option value="congelar">❄️ Congelar / Refrigerar</option>
				<option value="reposar">⏳ Reposar</option>
			</select>

			<input type="text" id="paso-inst" placeholder="Instrucción detallada...">
			
			<div id="campos-tecnicos" style="display: flex; gap: 5px;">
				<input type="number" id="paso-temp" placeholder="ºC" title="Temperatura">
				<input type="number" id="paso-tiempo" placeholder="min" title="Tiempo">
				<button onclick="ui.agregarPaso()" style="width: 45px; background: #431407;">+</button>
			</div>
		</div>
		
		<button onclick="guardarReceta()" style="height: 50px; font-size: 1.1em;">💾 GUARDAR LEGADO COMPLETO</button>
		<div id="mensaje"></div>
		<div id="grid-recetas"></div>
	</div>

	<script>
	// ... (Configuración de Supabase igual) ...

	let borradorIngredientes = [];
	let borradorPasos = [];

	const ui = {
		ajustarCamposPaso() {
			const tipo = document.getElementById('paso-tipo').value;
			const campoTemp = document.getElementById('paso-temp');
			// Si es batir o reposar, la temperatura suele ser opcional/ambiente
			campoTemp.style.display = (tipo === 'batir' || tipo === 'reposar') ? 'none' : 'block';
		},
		agregarIngrediente() {
			const n = document.getElementById('ing-nombre').value;
			const c = document.getElementById('ing-cant').value;
			if(!n || !c) return;
			borradorIngredientes.push({ nombre: n, cantidad: c, unidad: 'g' });
			this.renderBorradores();
			document.getElementById('ing-nombre').value = ""; document.getElementById('ing-cant').value = "";
		},
		agregarPaso() {
			const tipo = document.getElementById('paso-tipo').value;
			const inst = document.getElementById('paso-inst').value;
			const temp = parseFloat(document.getElementById('paso-temp').value) || null;
			const tiempo = document.getElementById('paso-tiempo').value || null;

			if (temp > 300) { alert("⚠️ Temperatura imposible para cocina."); return; }
			if(!inst) return;

			borradorPasos.push({ instruccion: `[${tipo.toUpperCase()}] ${inst}`, temperatura: temp, tiempo });
			this.renderBorradores();
			document.getElementById('paso-inst').value = "";
		},
		renderBorradores() {
			document.getElementById('lista-ing-borrador').innerHTML = borradorIngredientes.map((i, idx) => 
				`<div class="list-item"><b>${i.cantidad}g</b> ${i.nombre} <span onclick="ui.quitarIng(${idx})" style="float:right; cursor:pointer">🗑️</span></div>`
			).join('');
			
			document.getElementById('lista-pasos-borrador').innerHTML = borradorPasos.map((p, idx) => 
				`<div class="list-item"><b>Paso ${idx+1}:</b> ${p.instruccion} ${p.temperatura ? `(${p.temperatura}ºC)` : ''} <span onclick="ui.quitarPaso(${idx})" style="float:right; cursor:pointer">🗑️</span></div>`
			).join('');
		},
		quitarIng(idx) { borradorIngredientes.splice(idx, 1); this.renderBorradores(); },
		quitarPaso(idx) { borradorPasos.splice(idx, 1); this.renderBorradores(); }
	};

	// ... (Función guardarReceta usa borradorIngredientes y borradorPasos) ...
	</script>
</body>
</html>
