<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADN Culinario | Ingeniería de Legado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { amber: { 600: '#d97706' } } } } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfaf8; }
        .nt-warning { display: none !important; }
        .btn-active:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-3xl mx-auto">
    <header class="text-center mb-10">
        <h1 class="text-5xl font-extrabold text-stone-900 tracking-tighter italic">ADN Culinario</h1>
        <p class="text-amber-600 font-medium mt-2">v3.1 | Restauración de Ingredientes y Pasos</p>
    </header>

    <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-stone-100 mb-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 border-b border-stone-50 pb-8">
            <div>
                <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Nombre de la Receta</label>
                <input type="text" id="rec-nom" class="w-full border-b-2 border-stone-100 py-2 outline-none focus:border-amber-600 font-semibold" placeholder="Ej: Masa Madre 1940">
            </div>
            <div>
                <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Categoría (HU2)</label>
                <select id="rec-cat" class="w-full border-b-2 border-stone-100 py-2 outline-none bg-transparent font-bold text-stone-700">
                    <option value="">Seleccionar Categoría</option>
                    <option value="Panadería">🥖 Panadería</option>
                    <option value="Repostería">🍰 Repostería</option>
                    <option value="Salsas">🍯 Salsas</option>
                    <option value="Plato Principal">🥘 Plato Principal</option>
                    <option value="Entrantes">🥗 Entrantes</option>
                </select>
            </div>
        </div>

        <div class="mb-8 border-b border-stone-50 pb-8">
            <h3 class="text-xs font-black text-stone-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-stone-900 rounded-full"></span> 📝 Ingredientes del Legado
            </h3>
            <div class="flex gap-2 mb-4">
                <input type="text" id="ing-nom" placeholder="Ingrediente" class="flex-[2] p-3 rounded-xl border border-stone-200 outline-none text-sm">
                <input type="number" id="ing-cant" placeholder="Cant" class="flex-1 p-3 rounded-xl border border-stone-200 outline-none text-sm text-center">
                <select id="ing-uni" class="w-20 p-3 rounded-xl border border-stone-200 bg-white font-bold text-xs outline-none">
                    <option value="gr">gr</option>
                    <option value="ml">ml</option>
                    <option value="pz">pz</option>
                </select>
                <button onclick="App.addIng()" class="bg-stone-900 text-white px-5 rounded-xl hover:bg-stone-700 transition-all font-bold">+</button>
            </div>
            <div id="lista-ing" class="flex flex-wrap gap-2"></div>
        </div>

        <div class="mb-10 bg-stone-50 p-6 rounded-2xl border border-stone-100">
            <h3 class="text-xs font-black text-stone-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-amber-500 rounded-full"></span> ⚙️ Configuración de Paso Técnico
            </h3>
            
            <input type="text" id="paso-desc" placeholder="¿Qué hay que hacer? (Detalle técnico del paso)" 
                   class="w-full p-3 mb-4 rounded-xl border border-stone-200 outline-none focus:border-amber-600 shadow-sm">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                <select id="paso-tipo" onchange="App.uiAjustar()" class="p-3 rounded-xl border border-stone-200 font-bold bg-white text-sm outline-none">
                    <optgroup label="Hornos y Frío">
                        <option value="hornear">🔥 Hornear</option>
                        <option value="congelar">❄️ Congelar / Refrigerar</option>
                    </optgroup>
                    <optgroup label="Vitrocerámica / Fuego">
                        <option value="sofreir">🥘 Sofreír</option>
                        <option value="plancha">✨ Plancha</option>
                        <option value="hervir">💧 Hervir / Cocer</option>
                        <option value="freir">🍳 Freír</option>
                        <option value="guisar">🍲 Guisar / Chup-chup</option>
                    </optgroup>
                    <optgroup label="Mecánicos">
                        <option value="batir">🥣 Batir / Mezclar</option>
                        <option value="reposar">⏳ Reposar</option>
                        <option value="amasar">🥖 Amasar</option> 
                    </optgroup>
                </select>

                <div class="flex gap-2 items-end">
                    <div id="wrapper-temp" class="flex-grow">
                        <input type="number" id="paso-temp" placeholder="Temp °C" class="w-full p-3 rounded-xl border border-stone-200 outline-none text-center">
                    </div>
                    <div id="wrapper-int" class="flex-grow" style="display: none;">
                        <select id="paso-intensidad" class="w-full p-3 rounded-xl border border-stone-200 bg-white font-bold text-amber-700 text-xs outline-none">
                            <option value="">-- Intensidad --</option>
                            <option value="Fuego Mínimo">Fuego Mínimo</option>
                            <option value="Fuego Suave">Fuego Suave</option>
                            <option value="Fuego Medio">Fuego Medio</option>
                            <option value="Fuego Fuerte">Fuego Fuerte</option>
                            <option value="Fuego Máximo">Fuego Máximo</option>
                        </select>
                    </div>
                    <input type="number" id="paso-time" placeholder="Min" class="w-20 p-3 rounded-xl border border-stone-200 outline-none font-bold text-center">
                </div>
            </div>
            <button onclick="App.addPaso()" class="w-full bg-stone-900 text-white font-bold p-3 rounded-xl hover:bg-amber-600 transition-all btn-active">Añadir Paso</button>
            <div id="lista-pasos" class="mt-4 space-y-2"></div>
        </div>

        <button onclick="App.guardar()" class="w-full bg-amber-600 text-white font-black py-5 rounded-2xl hover:bg-amber-700 shadow-xl btn-active uppercase tracking-widest">
            Sincronizar Legado
        </button>
        <p id="msg" class="text-center text-xs mt-4 text-stone-400 font-bold uppercase"></p>
    </div>

    <div id="grid-recetas" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
</div>

<script>
    const SB_URL = 'https://tsmbobfnvforggaajurw.supabase.co';
    const SB_KEY = 'sb_publishable_z7-wVRQ1qGgPOHs6GIhDeg_A5L3wQD_';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const App = {
        recetas: [], bIng: [], bPasos: [],

        async init() {
            const { data } = await supabaseClient.from('recetas').select('*').order('created_at', { ascending: false });
            this.recetas = data || [];
            this.renderGrid();
            this.uiAjustar();
        },

        addIng() {
            const n = document.getElementById('ing-nom').value.trim();
            const c = parseFloat(document.getElementById('ing-cant').value);
            const u = document.getElementById('ing-uni').value;
            if(!n || isNaN(c) || c <= 0) return alert("⚠️ Nombre e ingrediente > 0 obligatorio.");
            this.bIng.push({ nombre: n, cantidad: c, unidad: u });
            this.renderIng();
            document.getElementById('ing-nom').value = ""; document.getElementById('ing-cant').value = "";
        },

        addPaso() {
            const desc = document.getElementById('paso-desc').value.trim();
            const tipo = document.getElementById('paso-tipo').value;
            const tiempo = parseInt(document.getElementById('paso-time').value);
            const int = document.getElementById('paso-intensidad').value;
            const temp = parseFloat(document.getElementById('paso-temp').value) || 0;

            if (!desc) return alert("⚠️ DETALLE: Describe la acción técnica del paso.");
            if ((tipo === 'reposar' || tipo === 'amasar') && (isNaN(tiempo) || tiempo <= 0)) return alert(`⚠️ ${tipo.toUpperCase()}: Tiempo obligatorio.`);
            
            this.bPasos.push({ desc, tipo, tiempo, intensidad: int, temp });
            this.renderPasos();
            document.getElementById('paso-desc').value = ""; document.getElementById('paso-time').value = "";
        },

        renderIng() {
            document.getElementById('lista-ing').innerHTML = this.bIng.map(i => `
                <span class="bg-stone-100 px-3 py-1.5 rounded-full text-[10px] font-black border border-stone-200">
                    ${i.nombre} (${i.cantidad}${i.unidad})
                </span>`).join('');
        },

        renderPasos() {
            document.getElementById('lista-pasos').innerHTML = this.bPasos.map(p => `
                <div class="bg-white p-3 rounded-xl border border-stone-200 text-[11px] font-bold shadow-sm">
                    <span class="text-amber-700 uppercase">${p.tipo}</span> | ${p.intensidad || p.temp+'°C'} | ${p.tiempo} min
                    <p class="text-stone-400 italic font-medium mt-1">${p.desc}</p>
                </div>`).join('');
        },

        uiAjustar() {
            const tipo = document.getElementById('paso-tipo').value;
            const esVitro = ["sofreir", "plancha", "hervir", "freir", "guisar", "amasar"].includes(tipo);
            document.getElementById('wrapper-int').style.display = esVitro ? "block" : "none";
            document.getElementById('wrapper-temp').style.display = (esVitro || tipo === "reposar") ? "none" : "block";
        },

        renderGrid() {
            document.getElementById('grid-recetas').innerHTML = this.recetas.map(r => `
                <div class="bg-white p-6 rounded-[2rem] border border-stone-100 shadow-sm">
                    <span class="text-[10px] font-black text-amber-600 bg-amber-50 px-2 py-1 rounded uppercase">${r.categoria}</span>
                    <h3 class="text-xl font-bold text-stone-800 mt-2">${r.nombre}</h3>
                </div>`).join('');
        },

        async guardar() {
            const n = document.getElementById('rec-nom').value.trim();
            const c = document.getElementById('rec-cat').value;
            if(!n || !c || this.bIng.length === 0 || this.bPasos.length === 0) return alert("⚠️ Faltan datos (Nombre, Categoría, Ingredientes o Pasos).");
            
            document.getElementById('msg').innerText = "⏳ SINCRO...";
            const { error } = await supabaseClient.from('recetas').insert([{ nombre: n, categoria: c }]);
            if(!error) {
                document.getElementById('msg').innerText = "✅ ÉXITO";
                this.bIng = []; this.bPasos = []; this.init();
            }
        }
    };
    App.init();
</script>
</body>
</html>
