<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADN Culinario - Base de Datos Activa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff5ed; padding: 20px; color: #431407; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { color: #f97316; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #fed7aa; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #f97316; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ea580c; }
        #mensaje { margin-top: 15px; text-align: center; font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍳 ADN Culinario</h1>
    <p style="text-align: center; font-size: 0.9em; color: #a3442d;">HU2: CONTROL DE TEMPERATURA Y TIEMPO</p>
    
    <input type="text" id="nombreReceta" placeholder="Nombre de la receta">
    
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <input type="number" id="cantidad" placeholder="Cant." style="flex: 1;">
        <select id="unidad" style="flex: 1; padding: 10px; border: 1px solid #fed7aa; border-radius: 8px;">
            <option value="g">g</option>
            <option value="ml">ml</option>
            <option value="ud">ud</option>
        </select>
        <input type="text" id="ingredienteNombre" placeholder="Ingrediente" style="flex: 2;">
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <input type="number" id="temperatura" placeholder="Temp. (ºC)" style="flex: 1;">
        <input type="number" id="tiempo" placeholder="Tiempo (min)" style="flex: 1;">
    </div>
    
    <button onclick="guardarReceta()">Guardar en el Legado</button>
    <div id="mensaje"></div>

    <div id="lista-recetas" style="margin-top: 30px; border-top: 2px solid #fed7aa; padding-top: 20px;">
        <h2 style="color: #f97316; text-align: center; font-size: 1.2em;">📖 El Legado Familiar</h2>
        <div id="grid-recetas"></div> </div>
</div>
<script>
	// CONFIGURACIÓN (Mantén tus credenciales)
	const SB_URL = 'https://tsmbobfnvforggaajurw.supabase.co'; 
	const SB_KEY = 'sb_publishable_z7-wVRQ1qGgPOHs6GIhDeg_A5L3wQD_';
	const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

	// --- MÓDULO API: Lógica Relacional (HU4) ---
	const api = {
		async guardarRecetaCompleta(nombre, ingredientes, pasos) {
			// 1. Insertar el Padre (Receta)
			const { data: receta, error: rError } = await supabaseClient
				.from('recetas')
				.insert([{ nombre }])
				.select()
				.single();

			if (rError) throw rError;

			// 2. Insertar los Hijos (Ingredientes) vinculados al ID del padre
			const ingData = ingredientes.map(i => ({ ...i, receta_id: receta.id }));
			const { error: iError } = await supabaseClient.from('ingredientes').insert(ingData);
			if (iError) throw iError;

			// 3. Insertar los Hijos (Pasos) vinculados al ID del padre
			const pasosData = pasos.map((p, idx) => ({ ...p, receta_id: receta.id, orden: idx }));
			const { error: pError } = await supabaseClient.from('pasos').insert(pasosData);
			if (pError) throw pError;

			return receta;
		},

		async obtenerTodoElLegado() {
			// Traemos recetas con sus hijos (Left Join)
			const { data, error } = await supabaseClient
				.from('recetas')
				.select(`
					id, nombre, created_at,
					ingredientes (nombre, cantidad, unidad),
					pasos (instruccion, temperatura, tiempo)
				`)
				.order('created_at', { ascending: false });
			
			if (error) throw error;
			return data;
		}
	};

	// --- MÓDULO UI: Visualización Limpia (HU3 + HU4) ---
	async function cargarLegado() {
		const grid = document.getElementById('grid-recetas');
		if (!grid) return;
		grid.innerHTML = "⏳ Sincronizando legado relacional...";

		try {
			const recetas = await api.obtenerTodoElLegado();
			grid.innerHTML = "";

			recetas.forEach(receta => {
				const card = document.createElement('div');
				card.style.cssText = "background:#fff; border:2px solid #fed7aa; padding:15px; border-radius:12px; margin-bottom:15px; cursor:pointer;";
				
				// Checklist dinámico
				card.onclick = function() {
					this.style.opacity = this.style.opacity === "0.4" ? "1" : "0.4";
					this.style.textDecoration = this.style.textDecoration === "line-through" ? "none" : "line-through";
				};

				// Renderizamos la receta y sus hijos (tomando el primero de cada para esta versión)
				const ing = receta.ingredientes[0] || {};
				const paso = receta.pasos[0] || {};

				card.innerHTML = `
					<div style="font-weight:bold; color:#431407;">${receta.nombre.toUpperCase()}</div>
					<div style="margin:10px 0;">
						<b style="color:#ea580c;">${ing.cantidad || 0}${ing.unidad || ''}</b> de ${ing.nombre || 'N/A'}
					</div>
					<div style="display:flex; gap:15px; font-size:0.9em; background:#fff5ed; padding:8px; border-radius:8px;">
						<span>🌡️ <b>${paso.temperatura || 0}ºC</b></span>
						<span>⏱️ <b>${paso.tiempo || 0} min</b></span>
					</div>
				`;
				grid.appendChild(card);
			});
		} catch (err) {
			console.error(err);
			grid.innerHTML = "❌ Error al cargar datos relacionales.";
		}
	}

	// --- CONTROLADOR: Orquestación de Guardado ---
	async function guardarReceta() {
		const msg = document.getElementById('mensaje');
		const nombre = document.getElementById('nombreReceta').value;
		
		// Captura de datos (por ahora 1 ingrediente y 1 paso por simplicidad de UI)
		const ingrediente = {
			nombre: document.getElementById('ingredienteNombre').value,
			cantidad: parseFloat(document.getElementById('cantidad').value),
			unidad: document.getElementById('unidad').value
		};
		
		const paso = {
			instruccion: "Instrucción base",
			temperatura: parseFloat(document.getElementById('temperatura').value),
			tiempo: parseFloat(document.getElementById('tiempo').value)
		};

		if (!nombre || isNaN(ingrediente.cantidad) || isNaN(paso.temperatura)) {
			msg.innerHTML = "⚠️ Faltan datos técnicos.";
			return;
		}

		try {
			msg.innerHTML = "⏳ Generando ADN relacional...";
			await api.guardarRecetaCompleta(nombre, [ingrediente], [paso]);
			msg.innerHTML = "<span style='color:green;'>✅ HU4: Guardado exitoso (Relacional).</span>";
			document.getElementById('nombreReceta').value = ""; // Limpieza (Escenario 3)
			cargarLegado();
		} catch (err) {
			msg.innerHTML = "❌ Error: " + err.message;
		}
	}

	// Inicio
	cargarLegado();
</script>
</body>
</html>
