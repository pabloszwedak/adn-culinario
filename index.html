<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADN Culinario - MVP2 Relacional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff5ed; padding: 20px; color: #431407; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { color: #f97316; text-align: center; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #fed7aa; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #f97316; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .badge { text-align: center; font-size: 0.8em; color: #a3442d; background: #fed7aa; border-radius: 5px; padding: 5px; margin-bottom: 15px; }
        .list-item { background: #fff5ed; padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 0.9em; border-left: 4px solid #f97316; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
	<div class="container">
		<h1>🍳 ADN Culinario Pro</h1>
		<div class="badge">MODO: MVP2 - DISEÑO DINÁMICO (HU4)</div>
		
		<input type="text" id="nombreReceta" placeholder="Nombre de la Receta (ej. Bizcocho)">

		<div style="border: 1px solid #fed7aa; padding: 15px; border-radius: 12px; margin-bottom: 20px; background: #fffaf5;">
			<p style="font-weight: bold; margin: 0 0 10px 0; color: #f97316;">📦 INGREDIENTES EN BORRADOR</p>
			<div id="lista-ing-borrador" style="margin-bottom: 10px;"></div>
			
			<div style="display: flex; gap: 5px;">
				<input type="number" id="ing-cant" placeholder="Cant." style="width: 80px;">
				<select id="ing-unidad" style="width: 80px;">
					<option value="g">g</option>
					<option value="ml">ml</option>
					<option value="ud">ud</option>
				</select>
				<input type="text" id="ing-nombre" placeholder="Ingrediente..." style="flex: 1;">
				<button onclick="ui.agregarIngrediente()" style="width: 45px; background: #431407;">+</button>
			</div>
		</div>

		<div style="border: 1px solid #ea580c; padding: 15px; border-radius: 12px; margin-bottom: 20px; background: #fffaf5;">
			<p style="font-weight: bold; margin: 0 0 10px 0; color: #ea580c;">🔥 PASOS TÉCNICOS</p>
			<div id="lista-pasos-borrador" style="margin-bottom: 10px;"></div>

			<select id="paso-tipo" onchange="ui.ajustarCamposPaso()" style="margin-bottom: 10px; background: #fff;">
				<option value="batir">🥣 Batir / Mezclar</option>
				<option value="hornear">🔥 Hornear</option>
				<option value="congelar">❄️ Congelar / Refrigerar</option>
				<option value="reposar">⏳ Reposar</option>
			</select>

			<input type="text" id="paso-inst" placeholder="Instrucción detallada...">
			
			<div id="campos-tecnicos" style="display: flex; gap: 5px;">
				<input type="number" id="paso-temp" placeholder="ºC">
				<input type="number" id="paso-tiempo" placeholder="min">
				<button onclick="ui.agregarPaso()" style="width: 45px; background: #431407;">+</button>
			</div>
		</div>
		
		<button onclick="guardarReceta()" style="height: 50px; font-size: 1.1em;">💾 GUARDAR LEGADO COMPLETO</button>
		<div id="mensaje"></div>
		<div id="grid-recetas"></div>
	</div>
	<script>
		const SB_URL = 'https://tsmbobfnvforggaajurw.supabase.co'; 
		const SB_KEY = 'sb_publishable_z7-wVRQ1qGgPOHs6GIhDeg_A5L3wQD_';
		const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

		let borradorIngredientes = [];
		let borradorPasos = [];

		const api = {
			async guardarRecetaCompleta(nombre, ingredientes, pasos) {
				const { data: receta, error: rError } = await supabaseClient.from('recetas').insert([{ nombre }]).select().single();
				if (rError) throw rError;
				const ingData = ingredientes.map(i => ({ ...i, receta_id: receta.id }));
				await supabaseClient.from('ingredientes').insert(ingData);
				const pasosData = pasos.map((p, idx) => ({ ...p, receta_id: receta.id, orden: idx }));
				await supabaseClient.from('pasos').insert(pasosData);
				return receta;
			},
			async obtenerTodoElLegado() {
				const { data, error } = await supabaseClient.from('recetas').select(`id, nombre, created_at, ingredientes(*), pasos(*)`).order('created_at', { ascending: false });
				if (error) throw error; return data;
			}
		};

		const ui = {
			ajustarCamposPaso() {
				const tipo = document.getElementById('paso-tipo').value;
				document.getElementById('paso-temp').style.display = (tipo === 'batir' || tipo === 'reposar') ? 'none' : 'block';
			},

			agregarIngrediente() {
				const n = document.getElementById('ing-nombre').value;
				const c = parseFloat(document.getElementById('ing-cant').value);
				const u = document.getElementById('ing-unidad').value;
				
				if(!n) { alert("⚠️ Falta el nombre del ingrediente"); return; }
				if(isNaN(c) || c <= 0) { 
					alert(`⚠️ La cantidad de "${n}" debe ser mayor a 0`); 
					return; 
				}
				
				borradorIngredientes.push({ nombre: n, cantidad: c, unidad: u });
				this.render(); // Ahora sí existe
				document.getElementById('ing-nombre').value = ""; 
				document.getElementById('ing-cant').value = "";
			},

			agregarPaso() {
				const tipo = document.getElementById('paso-tipo').value;
				let inst = document.getElementById('paso-inst').value; 
				const temp = parseFloat(document.getElementById('paso-temp').value);
				const tiempo = document.getElementById('paso-tiempo').value;

				// 1. LÓGICA DE OBLIGATORIEDAD (HU4 - Refinamiento Final)
				const tieneInstruccion = inst.trim() !== "";
				const tieneTiempo = (tiempo && tiempo > 0);

				if (tipo === 'batir' || tipo === 'mezclar') {
					// Para batir/mezclar: Al menos uno de los dos
					if (!tieneInstruccion && !tieneTiempo) {
						alert("⚠️ Para Batir/Mezclar, debes indicar al menos el tiempo o una instrucción detallada.");
						return;
					}
				} else {
					// Para el resto (Hornear, Congelar, Reposar): Tiempo es obligatorio
					if (!tieneTiempo) {
						alert(`⚠️ El tiempo es obligatorio para el paso: ${tipo.toUpperCase()}`);
						return;
					}
				}

				// 2. GESTIÓN DE TEXTO VISUAL
				// Si no hay instrucción pero hay tiempo, usamos el tipo como nombre
				const instruccionFinal = !tieneInstruccion 
					? `${tipo.charAt(0).toUpperCase() + tipo.slice(1)}` 
					: inst;

				// 3. VALIDACIONES DE TEMPERATURA (RANGOS)
				if (tipo === 'hornear' && (temp < 30 || temp > 300)) { 
					alert(`⚠️ Para hornear, la temperatura debe estar entre 30°C y 300°C`); 
					return; 
				}
				if (tipo === 'congelar' && (temp < -40 || temp > 15)) { 
					alert(`⚠️ Para congelar/refrigerar, el rango es -40°C a 15°C`); 
					return; 
				}

				// 4. GUARDADO EN BORRADOR
				borradorPasos.push({ 
					instruccion: `[${tipo.toUpperCase()}] ${instruccionFinal}`, 
					temperatura: isNaN(temp) ? null : temp, 
					tiempo: tieneTiempo ? tiempo : null 
				});
				
				this.render();
				
				// Limpiar campos
				document.getElementById('paso-inst').value = "";
				document.getElementById('paso-temp').value = "";
				document.getElementById('paso-tiempo').value = "";
			},

			render() {
				// Render de Ingredientes
				document.getElementById('lista-ing-borrador').innerHTML = borradorIngredientes.map((i, idx) => 
					`<div class="list-item"><span>🔹 ${i.cantidad}${i.unidad} - ${i.nombre}</span><span onclick="ui.quitarIng(${idx})" style="cursor:pointer">🗑️</span></div>`).join('');
				
				// Render de Pasos (Actualizado: Temp + Tiempo)
				document.getElementById('lista-pasos-borrador').innerHTML = borradorPasos.map((p, idx) => {
					let detalles = [];
					if (p.temperatura) detalles.push(`${p.temperatura}°C`);
					if (p.tiempo) detalles.push(`${p.tiempo} min`);
					
					const stringDetalles = detalles.length > 0 ? `(${detalles.join(' | ')})` : '';

					return `<div class="list-item">
						<span>⏱️ ${p.instruccion} ${stringDetalles}</span>
						<span onclick="ui.quitarPaso(${idx})" style="cursor:pointer">🗑️</span>
					</div>`;
				}).join('');
			},

			quitarIng(idx) { borradorIngredientes.splice(idx, 1); this.render(); },
			quitarPaso(idx) { borradorPasos.splice(idx, 1); this.render(); }
		};

		async function guardarReceta() {
			const msg = document.getElementById('mensaje');
			const nombre = document.getElementById('nombreReceta').value;
			if(!nombre || borradorIngredientes.length === 0) { alert("Falta nombre o ingredientes"); return; }
			try {
				msg.innerHTML = "⏳ Guardando...";
				await api.guardarRecetaCompleta(nombre, borradorIngredientes, borradorPasos);
				msg.innerHTML = "✅ Guardado con éxito";
				borradorIngredientes = []; borradorPasos = []; ui.render();
				document.getElementById('nombreReceta').value = "";
				cargarLegado();
			} catch(e) { msg.innerHTML = "❌ Error: " + e.message; }
		}

		async function cargarLegado() {
			const grid = document.getElementById('grid-recetas');
			try {
				const recetas = await api.obtenerTodoElLegado();
				grid.innerHTML = recetas.map(r => `
					<div style="background:white; border:2px solid #fed7aa; padding:15px; border-radius:12px; margin-bottom:10px;">
						<div style="font-weight:bold;">${r.nombre.toUpperCase()}</div>
						<div style="font-size:0.8em;">${r.ingredientes.length} ing. | ${r.pasos.length} pasos</div>
					</div>
				`).join('');
			} catch(e) { console.error(e); }
		}

		ui.ajustarCamposPaso(); // Inicializar visibilidad
		cargarLegado();
	</script>
</body>
</html>
