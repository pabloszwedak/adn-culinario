<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADN Culinario | Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { colors: { amber: { 600: '#d97706' } } } }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfaf8; }
        .recipe-card:hover { transform: translateY(-3px); transition: all 0.2s; }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-3xl mx-auto" id="main-view">
    <header class="text-center mb-10">
        <h1 class="text-5xl font-extrabold text-stone-900 tracking-tighter italic">ADN Culinario</h1>
        <p class="text-amber-600 font-medium mt-2 text-lg">Protección del Legado Gastronómico</p>
    </header>

    <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-stone-100 mb-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div>
                <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Nombre de la Receta</label>
                <input type="text" id="rec-nom" class="w-full border-b-2 border-stone-100 py-2 outline-none focus:border-amber-600" placeholder="Ej: Masa Madre 1940">
            </div>
            <div>
                <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Categoría (HU2)</label>
                <select id="rec-cat" class="w-full border-b-2 border-stone-100 py-2 outline-none bg-transparent">
                    <option value="Panadería">🥖 Panadería</option>
                    <option value="Salsas">🍯 Salsas</option>
                    <option value="Principal">🥘 Plato Principal</option>
                    <option value="Repostería">🍰 Repostería</option>
                    <option value="Entrantes">🥗 Entrantes</option>
                </select>
            </div>
        </div>

        <div class="mb-8">
            <h3 class="text-sm font-bold text-stone-800 mb-3 uppercase tracking-wider flex items-center gap-2">
                <span class="w-2 h-2 bg-amber-500 rounded-full"></span> 📝 Ingredientes
            </h3>
            <div class="flex gap-2">
                <input type="text" id="ing-nom" placeholder="Ingrediente" class="flex-grow bg-stone-50 p-3 rounded-xl outline-none">
                <input type="number" id="ing-cant" placeholder="0" class="w-20 bg-stone-50 p-3 rounded-xl outline-none">
                <select id="ing-uni" class="w-24 bg-stone-100 p-3 rounded-xl outline-none font-bold text-stone-600">
                    <option value="gr">gr</option>
                    <option value="ml">ml</option>
                    <option value="pizca">pizca</option>
                </select>
                <button onclick="App.addIng()" class="bg-stone-900 text-white px-5 rounded-xl hover:bg-amber-600 font-bold">+</button>
            </div>
            <div id="lista-ing" class="mt-4 flex flex-wrap gap-2"></div>
        </div>

        <div class="mb-10 bg-stone-50 p-6 rounded-2xl border border-stone-100">
            <h3 class="text-sm font-bold text-stone-800 mb-3 uppercase tracking-wider">⚙️ Ingeniería de Pasos</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                <select id="pas-tipo" class="p-3 rounded-xl border border-stone-200" onchange="App.toggleCampos()">
                    <option value="Amasar">🥣 Amasar</option>
                    <option value="Hornear">🔥 Hornear</option>
                    <option value="Congelar">❄️ Congelar</option>
                    <option value="Fuego">🥘 Fuego</option>
                </select>
                <div class="flex gap-2">
                    <input type="number" id="pas-temp" placeholder="Temp °C" class="w-1/2 p-3 rounded-xl border border-stone-200">
                    <input type="number" id="pas-time" placeholder="Min" class="w-1/2 p-3 rounded-xl border border-stone-200">
                </div>
            </div>
            <button onclick="App.addPaso()" class="w-full bg-stone-200 text-stone-700 font-bold p-3 rounded-xl hover:bg-stone-300">Añadir Paso</button>
            <div id="lista-pas" class="mt-4 space-y-2"></div>
        </div>

        <button onclick="App.guardar()" class="w-full bg-amber-600 text-white font-bold py-5 rounded-2xl hover:bg-amber-700 shadow-lg">GUARDAR LEGADO</button>
        <p id="msg" class="text-center text-xs mt-4 text-stone-400 font-bold"></p>
    </div>

    <div id="grid-recetas" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
</div>

<script>
    // Credenciales Sincronizadas
    const SB_URL = 'https://tsmbobfnvforggaajurw.supabase.co';
    const SB_KEY = 'sb_publishable_z7-wVRQ1qGgPOHs6GIhDeg_A5L3wQD_';
    const client = supabase.createClient(SB_URL, SB_KEY);

    const App = {
        recetas: [],
        bIng: [],
        bPas: [],

        async init() {
            const { data } = await client.from('recetas').select('*').order('created_at', { ascending: false });
            this.recetas = data || [];
            this.renderGrid();
        },

        addIng() {
            const n = document.getElementById('ing-nom').value;
            const c = document.getElementById('ing-cant').value;
            const u = document.getElementById('ing-uni').value;
            if(!n || !c) return;
            this.bIng.push({ nombre: n, cantidad: c, unidad: u });
            this.renderListas();
            document.getElementById('ing-nom').value = ""; document.getElementById('ing-cant').value = "";
        },

        addPaso() {
            const t = document.getElementById('pas-tipo').value;
            const temp = parseFloat(document.getElementById('pas-temp').value) || 0;
            const time = parseInt(document.getElementById('pas-time').value) || 0;

            // Validaciones HU5
            if(t === "Hornear" && (temp < 1 || temp > 500 || time <= 0)) return alert("⚠️ Hornear: 1-500°C y Tiempo.");
            if(t === "Congelar" && (temp < -50 || temp > 15 || time <= 0)) return alert("⚠️ Frío: -50 a 15°C y Tiempo.");
            
            this.bPas.push({ tipo: t, temperatura: temp, tiempo: time });
            this.renderListas();
        },

        renderListas() {
            document.getElementById('lista-ing').innerHTML = this.bIng.map(i => `<span class="bg-amber-100 px-3 py-1 rounded-full text-[10px] font-black">${i.nombre} ${i.cantidad}${i.unidad}</span>`).join('');
            document.getElementById('lista-pas').innerHTML = this.bPas.map(p => `<div class="bg-white p-2 rounded-lg border text-xs font-bold flex justify-between"><span>${p.tipo}</span><span>${p.temperatura}°C | ${p.tiempo} min</span></div>`).join('');
        },

        renderGrid() {
            document.getElementById('grid-recetas').innerHTML = this.recetas.map(r => `<div class="bg-white p-6 rounded-3xl border shadow-sm"><span class="text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-1 rounded">${r.categoria}</span><h3 class="text-xl font-bold mt-2">${r.nombre}</h3></div>`).join('');
        },

        async guardar() {
            const n = document.getElementById('rec-nom').value;
            const c = document.getElementById('rec-cat').value;
            if(!n || this.bIng.length === 0) return alert("⚠️ Faltan datos.");
            document.getElementById('msg').innerText = "⏳ GUARDANDO...";
            const { error } = await client.from('recetas').insert([{ nombre: n, categoria: c }]);
            if(!error) {
                document.getElementById('msg').innerText = "✅ ÉXITO";
                this.bIng = []; this.bPas = [];
                this.renderListas();
                this.init();
            }
        },

        toggleCampos() {
            const t = document.getElementById('pas-tipo').value;
            document.getElementById('pas-temp').style.visibility = (t === "Amasar") ? "hidden" : "visible";
        }
    };
    App.init();
</script>
</body>
</html>
